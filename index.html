<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Live - Ultimate Race Control</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body data-active-panel="telemetry">
    <div id="loading-overlay">
      <div class="f1-logo">F1</div>
      <div class="loader">Memuat data OpenF1</div>
      <div id="loading-status">Inisialisasi sistem...</div>
    </div>

    <header class="app-header">
      <div class="f1-logo-container">
        <span class="f1-logo">F1</span>
        <div class="session-header-info">
          <div id="track-name">Sakhir Grand Prix</div>
          <div id="session-date">2024 • Race Session</div>
        </div>
      </div>

      <nav class="header-center-nav" aria-label="Mode tampilan">
        <button class="nav-pill active" data-view="tracker">Driver Tracker</button>
        <button class="nav-pill" data-view="leaderboard">Leaderboard</button>
        <button class="nav-pill" data-view="timing">Timing Data</button>
        <button class="nav-pill" data-view="strategy">Pit Strategy</button>
      </nav>

      <div class="header-right">
        <div class="lap-counter-box">
          LAP <span id="current-lap">1</span> / <span id="total-laps">--</span>
        </div>
        <button id="toggle-session-loader" aria-label="Pilih sesi">📅</button>
      </div>
    </header>

    <div class="sub-navbar">
      <div class="live-tag"><span class="dot"></span> REPLAY</div>
      <div class="tab-group" aria-label="Panel data">
        <button class="tab-item active" data-panel="telemetry">Telemetry</button>
        <button class="tab-item" data-panel="sectors">Sectors</button>
        <button class="tab-item" data-panel="weather">Weather</button>
        <button class="tab-item" data-panel="messages">Messages</button>
      </div>
    </div>

    <div class="app-viewport">
      <div id="session-loader-overlay" class="session-loader-mini">
        <div class="sidebar-header">Select Session</div>
        <div id="session-selector"></div>
      </div>

      <aside class="sidebar-leaderboard">
        <div class="sidebar-header">Positions</div>
        <div id="leaderboard" class="leaderboard-container"></div>
      </aside>

      <section id="driver-info-panel" class="info-panel">
        <div class="driver-profile">
          <div class="profile-top">
            <div class="profile-img-wrap">
              <img
                id="telemetry-driver-avatar"
                src="https://placehold.co/96x96/15151e/ffffff?text=F1"
                alt="Driver"
              />
            </div>
            <div class="profile-text">
              <span class="d-name" id="telemetry-driver-name">Select Driver</span>
              <span class="d-team" id="telemetry-team-name">No Active Data</span>
            </div>
            <button id="close-info-panel" class="ghost-close" aria-label="Tutup panel">×</button>
          </div>
        </div>

        <div class="telemetry-dashboard">
          <div class="telemetry-top-info">
            <div id="telemetry-lap-time" class="telemetry-lap-time">--:--.---</div>
            <div class="tyre-indicator">
              <span class="tyre-life">--</span>
              <span class="tyre-compound compound-s">S</span>
            </div>
          </div>

          <div class="main-gauge-container">
            <svg class="f1-gauge-svg" viewBox="0 0 200 200">
              <defs>
                <!-- Paths for circular text labels -->
                <path id="speed-text-path" d="M 35 155 A 82 82 0 1 1 165 155" />
                <path id="throttle-text-path" d="M 55 140 A 60 60 0 0 1 100 40" />
                <path id="brake-text-path" d="M 100 40 A 60 60 0 0 1 145 140" />
              </defs>

              <!-- Outermost: Speedometer Scale -->
              <path class="gauge-ring speedometer-bg" d="M 35 155 A 82 82 0 1 1 165 155" fill="none" stroke-width="14" />
              <path id="gauge-speed-path" class="gauge-ring speedometer-fill" d="M 35 155 A 82 82 0 1 1 165 155" fill="none" stroke-width="14" stroke-dasharray="400" stroke-dashoffset="400" />

              <!-- Inner: Symmetrical Throttle & Brake -->
              <!-- Left: Throttle -->
              <path class="gauge-ring throttle-bg" d="M 55 140 A 60 60 0 0 1 100 40" fill="none" stroke-width="14" />
              <path id="gauge-throttle-path" class="gauge-ring throttle-fill" d="M 55 140 A 60 60 0 0 1 100 40" fill="none" stroke-width="14" stroke-dasharray="200" stroke-dashoffset="200" />

              <!-- Right: Brake -->
              <path class="gauge-ring brake-bg" d="M 145 140 A 60 60 0 0 0 100 40" fill="none" stroke-width="14" />
              <path id="gauge-brake-path" class="gauge-ring brake-fill" d="M 145 140 A 60 60 0 0 0 100 40" fill="none" stroke-width="14" stroke-dasharray="200" stroke-dashoffset="200" />

              <!-- Decorative Markers (Curved) -->
              <g class="gauge-markers">
                <text class="marker-text"><textPath xlink:href="#speed-text-path" startOffset="0%">0</textPath></text>
                <text class="marker-text"><textPath xlink:href="#speed-text-path" startOffset="16.6%">60</textPath></text>
                <text class="marker-text"><textPath xlink:href="#speed-text-path" startOffset="33.3%">120</textPath></text>
                <text class="marker-text"><textPath xlink:href="#speed-text-path" startOffset="50%">180</textPath></text>
                <text class="marker-text"><textPath xlink:href="#speed-text-path" startOffset="66.6%">240</textPath></text>
                <text class="marker-text"><textPath xlink:href="#speed-text-path" startOffset="83.3%">300</textPath></text>
                <text class="marker-text"><textPath xlink:href="#speed-text-path" startOffset="100%">360</textPath></text>
              </g>

              <!-- Curved Labels using textPath -->
              <text class="gauge-curved-label">
                <textPath xlink:href="#throttle-text-path" startOffset="50%" text-anchor="middle" dy="-8">THROTTLE</textPath>
              </text>
              <text class="gauge-curved-label">
                <textPath xlink:href="#brake-text-path" startOffset="50%" text-anchor="middle" dy="-8">BRAKE</textPath>
              </text>
            </svg>

            <div class="gauge-center-content">
              <div class="speed-display">
                <span id="telemetry-speed" class="speed-value">0</span>
                <span class="speed-unit">KM/H</span>
              </div>
              <div class="rpm-display">
                <span id="telemetry-rpm" class="rpm-value">0</span>
                <span class="rpm-unit">RPM</span>
              </div>
            </div>

            <div class="gauge-bottom-content">
              <div id="telemetry-drs" class="drs-status">DRS</div>
              <div class="gear-display">
                <span class="gear-label">GEAR</span>
                <span id="telemetry-gear" class="gear-value">N</span>
              </div>
            </div>
          </div>
        </div>

        <div class="panel-tabs">
          <div class="feed-header"><span>Race Control Feed</span></div>
          <div id="race-feed" class="feed-content"></div>
          <div class="feed-header"><span>Pit Stop Log</span></div>
          <div id="pit-stops-feed" class="feed-content"></div>
        </div>
      </section>

      <main class="track-viewport">
        <canvas id="track-map"></canvas>
        <div class="map-tools">
          <button class="tool-btn" id="center-map" title="Center Map">⌖</button>
          <button class="tool-btn" id="zoom-in" title="Zoom In">＋</button>
          <button class="tool-btn" id="zoom-out" title="Zoom Out">－</button>
        </div>
      </main>
    </div>

    <footer class="app-footer">
      <div class="playback-status">
        <span class="phase-tag" id="session-phase">REPLAY</span>
        <div id="time-display">00:00:00</div>
      </div>

      <div class="timeline-wrap">
        <button id="play-pause" disabled aria-label="Putar replay">▶</button>
        <input type="range" id="timeline-slider" min="0" max="100" value="0" disabled />
      </div>

      <div class="footer-widgets">
        <div class="speed-select-wrap">
          <select id="speed-select" disabled>
            <option value="1">1x Speed</option>
            <option value="2">2x Speed</option>
            <option value="5">5x Speed</option>
            <option value="10">10x Speed</option>
            <option value="20">20x Speed</option>
          </select>
        </div>

        <div class="weather-widget" id="weather-display">
          <div class="w-item">
            <span class="w-label">AIR</span>
            <span class="w-val" id="air-temp">--°C</span>
          </div>
          <div class="w-item">
            <span class="w-label">TRACK</span>
            <span class="w-val" id="track-temp">--°C</span>
          </div>
        </div>

        <div class="rolex-logo">
          <span class="crown">♛</span>
          <span class="brand">ROLEX</span>
        </div>
      </div>
    </footer>

    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
